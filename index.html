<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Interactive Card Details Form | Frontend Mentor By Juan Cruz Tobares</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <main class="main__container">
    <aside class="container__cards">
      <div class="card card--front">
        <img class="card__logo" src="/images/card-logo.svg" alt="Card Logo Image">
        <div class="card__number">
          <p class="card__number-text" id="cardNumber"></p>
        </div>
        <div class="card__details">
          <span class="card__owner" id="cardholder"></span>
          <p class="card__expiry">
            <span id="expiryMonth"></span>
            /
            <span id="expiryYear"></span>
          </p>
        </div>
      </div>
      <div class="card card--back">
        <div class="card__cvc">
          <p class="card__cvc-number" id="cvcNumber"></p>
        </div>
      </div>
    </aside>
    <div class="container__form">
      <form id="formCardData">
        <div class="form__fields">
          <div class="form__label">
            <label 
              for="inputCardholder" 
            >
              Cardholder name
            </label>
          </div>
          <input 
            id="inputCardholder"
            type="text"
            maxlength="30" 
            placeholder="eg. Jane Appleseed" 
            aria-label="Cardholder" 
            name="cardholder"
          >
          <span class="error" id="cardholderMessage"></span>
        </div>
        <div class="form__fields">
          <div class="form__label">
            <label 
              for="inputCardNumber" 
            >
              Card Number
            </label>
          </div>
          <input
            id="inputCardNumber"
            type="text" 
            inputmode="numeric"
            maxlength="19"
            placeholder="e.g. 1234 5678 9123 0000"
            aria-label="Card number" 
            name="cardNumber"
          >
          <span class="error" id="cardNumberMessage"></span>
        </div>
        <div class="form__row">
          <div class="form__fields">
            <div class="form__label">
              <label 
                for="inputMonth"
              >
                Exp. Date (mm/yy)
              </label>
            </div>
            <input
              id="inputMonth"
              type="text"
              inputmode="numeric"
              maxlength="2"
              placeholder="MM"
              aria-label="Month Expiration"
              aria-describedby="basic-addon1"
              name="month"
            />
            <span class="error" id="dateMessage"></span>
          </div>
          <div class="form__fields">
            <div class="form__label">
              <label 
                aria-hidden="true">
                &nbsp;
              </label>
            </div>
            <input
              id="inputYear"
              type="text"
              inputmode="numeric"
              maxlength="2"
              placeholder="YY"
              aria-label="Year Expiration"
              aria-describedby="basic-addon1"
              name="year"
            />
          </div>
          <div class="form__fields">
            <div class="form__label">
              <label 
                for="inputCVC"
              >
                CVC
              </label>
            </div>
            <input
              id="inputCVC"
              type="text"
              inputmode="numeric"
              maxlength="3"
              placeholder="eg. 123"
              aria-label="CVC"
              aria-describedby="basic-addon1"
              name="cvc"
            />
            <span class="error" id="cvcMessage"></span>
          </div>
        </div>
        <div class="form__button">
          <button type="submit">Confirm</button>
        </div>
      </form>
      <section class="success-message hidden" id="successMessage">
        <img class="success-message__img" src="/images/icon-complete.svg" alt="Icon Complete">
        <h1 class="success-message__title">Thank You!</h1>
        <p class="success-message__subtitle" id="successSubtitle"></p>
        <button class="success-message__button" type="submit">Continue</button>
      </section>
    </div>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
